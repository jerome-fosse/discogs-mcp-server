name: Release
run-name: ${{ github.actor }} is releasing Discogs MCP Server ${{ github.ref_name }}
on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Extraire la section du changelog correspondant à la version (Keep a Changelog format)
          awk -v ver="${VERSION}" '/^## \[/{if(found) exit; found=($0 ~ "\\[" ver "\\]"); next} found' CHANGELOG.md > release_notes.txt
          cat release_notes.txt
          
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: target/discogs-mcp-server-*.jar
          body_path: release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}